{% extends "base.html" %}
{% block title %}ไม่พบหน้านี้ - 404{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center py-5 text-center animate-in">
  <div class="error-code text-accent fw-800 mb-0" style="font-size: 10rem; line-height: 1; opacity: 0.8; letter-spacing: -5px;">404</div>
  <div class="glass-panel p-5 rounded-4 shadow-lg" style="max-width: 500px; margin-top: -30px; position: relative; z-index: 2;">
    <h2 class="mb-3 fw-bold">หาหน้าไม่เจอ...</h2>
    <p class="text-secondary mb-4">สงสัยร้านนี้จะปิด หรือคุณอาจจะจำทางผิดไปหน่อย</p>
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary px-5 py-2 rounded-pill pulse-primary">
      <i class="bi bi-house-door me-2"></i> กลับหน้าหลัก
    </a>
  </div>
</div>

<style>
  .error-code {
    background: linear-gradient(180deg, var(--purple-400), transparent);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .fw-800 { font-weight: 800; }
</style>
{% endblock %}
