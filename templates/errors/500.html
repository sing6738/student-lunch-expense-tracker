{% extends "base.html" %}
{% block title %}เกิดข้อผิดพลาด - 500{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center py-5 text-center animate-in">
  <div class="error-code text-danger fw-800 mb-0" style="font-size: 10rem; line-height: 1; opacity: 0.8; letter-spacing: -5px;">500</div>
  <div class="glass-panel p-5 rounded-4 shadow-lg" style="max-width: 500px; margin-top: -30px; position: relative; z-index: 2;">
    <h2 class="mb-3 fw-bold">ระบบขัดข้องนิดหน่อย</h2>
    <p class="text-secondary mb-4">ดูเหมือนพ่อครัวจะทำกระทะไหม้... เดี๋ยวเรากำลังรีบซ่อมให้นะครับ</p>
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary px-5 py-2 rounded-pill pulse-primary">
      <i class="bi bi-arrow-left me-2"></i> กลับไปตั้งหลัก
    </a>
  </div>
</div>

<style>
  .error-code {
    background: linear-gradient(180deg, #ef4444, transparent);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .fw-800 { font-weight: 800; }
</style>
{% endblock %}
